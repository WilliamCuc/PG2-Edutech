<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte Pedagógico</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; font-size: 9pt; line-height: 1.4; margin: 0; padding: 0; }
        @page { margin: 1.2cm; }
        h1 { font-size: 16pt; color: #111827; border-bottom: 2px solid #e5e7eb; padding-bottom: 6px; }
        h2 { font-size: 12pt; color: #1f2937; border-bottom: 1px solid #f3f4f6; padding-bottom: 4px; margin-top: 1em; }
        .ia-opinion { background-color: #f3f4f6; border: 1px solid #d1d5db; border-radius: 6px; padding: 0.8em; font-size: 8.5pt; }
        .preserve-whitespace { white-space: pre-wrap; }
        .info-grid { display: flex; gap: 1em; font-size: 8.5pt; color: #374151; }
        ul { padding-left: 1.2em; margin: 0.3em 0; }
        li { margin-bottom: 0.2em; }
    </style>
</head>
<body>
    <h1>Reporte Pedagógico con IA</h1>
    <div class="info-grid">
        <span><strong>Curso:</strong> {{ curso }}</span>
        <span><strong>Maestro:</strong> {{ maestro.user.get_full_name }}</span>
        <span><strong>Fecha:</strong> {% now "d/m/Y" %}</span>
        <span><strong>Método:</strong> {{ metodo_analisis }}</span>
    </div>

    <h2>Análisis de la IA</h2>
    <div class="ia-opinion preserve-whitespace">{{ opinion_ia }}</div>

    <h2>Planificación</h2>
    <div class="preserve-whitespace">{{ planificacion }}</div>

    <h2>Diario Pedagógico</h2>
    <div class="preserve-whitespace">{{ diario }}</div>
</body>
</html>
